# ===================== KET NOI DATABASE (SQL SERVER) =====================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=nha_tro_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===================== JPA / HIBERNATE =====================
# QUAN TRONG: de "validate" vi schema da duoc tao san
# bang file database/nha_tro_sqlserver.sql. Khong dung "update"/"create"
# de tranh Hibernate tu y sua cau truc bang.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================== SERVER =====================
server.port=8080

# ===================== JACKSON (format ngay thang JSON tra ve FE) =====================
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
